<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bajka Iredynski — Archiwum</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #ffffff;
    --bg-alt: #f8f8f8;
    --border: #e0e0e0;
    --border-light: #f0f0f0;
    --text: #1a1a1a;
    --text-secondary: #666666;
    --text-tertiary: #999999;
    --accent: #000000;
    --hover: #0055ff;
    --font: 'Helvetica Neue', 'Inter', Helvetica, Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  ::selection { background: #000; color: #fff; }

  .topbar {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.9rem 2.5rem;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-light);
  }
  .topbar-brand {
    font-size: 0.75rem; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--text); text-decoration: none;
  }
  .topbar-nav { display: flex; gap: 1.8rem; }
  .topbar-nav a {
    font-size: 0.7rem; font-weight: 400;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-tertiary); text-decoration: none;
    transition: color 0.2s;
  }
  .topbar-nav a:hover { color: var(--text); }

  .page-container {
    max-width: 780px;
    margin: 0 auto;
    padding: 3rem 2.5rem 5rem;
  }

  .page-title {
    font-size: 2.2rem;
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .page-meta {
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .content p {
    font-size: 1.05rem;
    font-weight: 400;
    line-height: 1.8;
    margin-bottom: 1rem;
    color: var(--text);
  }

  .content p:empty { margin-bottom: 0.4rem; }

  .content a {
    color: var(--text);
    text-decoration: underline;
    text-decoration-color: var(--border);
    text-underline-offset: 3px;
    transition: text-decoration-color 0.2s, color 0.2s;
  }

  .content a:hover {
    color: var(--hover);
    text-decoration-color: var(--hover);
  }

  .content .img-block {
    margin: 2rem 0;
    text-align: center;
  }

  .content .img-block img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto;
  }

  .content .img-caption {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-top: 0.5rem;
    font-weight: 400;
  }

  .content .vimeo-embed {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
    margin: 2rem 0;
    background: var(--bg-alt);
  }

  .content .vimeo-embed iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  .content ul, .content ol {
    margin: 0.5rem 0 1rem 1.5rem;
    font-size: 1.05rem;
    font-weight: 400;
  }

  .content li {
    margin-bottom: 0.4rem;
    line-height: 1.7;
  }

  .content .separator {
    border: none;
    border-top: 1px solid var(--border-light);
    margin: 2rem 0;
  }

  .content h2 {
    font-size: 1.25rem;
    font-weight: 500;
    margin: 2rem 0 1rem;
    letter-spacing: -0.01em;
  }

  .content h3 {
    font-size: 1.1rem;
    font-weight: 500;
    margin: 1.8rem 0 0.8rem;
  }

  .content h3 {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin: 2rem 0 0.8rem;
  }

  .content blockquote {
    border-left: 2px solid var(--border);
    padding-left: 1.2rem;
    margin: 1.5rem 0;
    color: var(--text-secondary);
    font-style: italic;
  }

  .back-link {
    display: inline-block;
    margin-bottom: 2rem;
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    text-decoration: none;
    transition: color 0.2s;
  }

  .back-link:hover { color: var(--text); }

  .page-footer {
    border-top: 1px solid var(--border);
    margin-top: 3rem;
    padding-top: 1.5rem;
    font-size: 0.65rem;
    color: var(--text-tertiary);
    display: flex;
    justify-content: space-between;
  }

  .page-footer a {
    color: var(--text-tertiary);
    text-decoration: none;
    transition: color 0.2s;
  }

  .page-footer a:hover { color: var(--text); }

  @media (max-width: 700px) {
    .topbar { padding: 0.7rem 1rem; }
    .topbar-brand { font-size: 0.6rem; letter-spacing: 0.1em; }
    .topbar-nav { gap: 0.8rem; }
    .topbar-nav a { font-size: 0.55rem; letter-spacing: 0.08em; }
    .page-container { padding: 2rem 1.2rem 3rem; }
    .page-title { font-size: 1.5rem; }
  }
</style>

</head>

</nav>

</div>

</html>
